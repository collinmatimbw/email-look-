services:
  - type: web
    name: email-look-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: email-look-db
          property: connectionString
      - key: DATABASE_URL_ASYNC
        fromDatabase:
          name: email-look-db
          property: poolingConnectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://email-look.vercel.app"]'

databases:
  - name: email-look-db
    plan: free
    region: ohio
